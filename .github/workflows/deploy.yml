name: Deploy to Windows IIS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Copy to IIS
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: deploy_temp_folder
          clean: false

      - name: Deploy to IIS Folder
        shell: powershell
        run: |
          $sourceFile = Join-Path $env:GITHUB_WORKSPACE "deploy_temp_folder\index.html"
          $destFile = "C:\inetpub\Trip\index.html"
          $destDir = "C:\inetpub\Trip"
          
          Write-Host "Source: $sourceFile"
          Write-Host "Target: $destFile"
          
          if (-not (Test-Path $destDir)) {
              New-Item -ItemType Directory -Force -Path $destDir
          }
          
          if (Test-Path $sourceFile) {
              Copy-Item -Path $sourceFile -Destination $destFile -Force
              Write-Host "Deployment Successful!"
          } else {
              Write-Host "Error: Source file not found at $sourceFile"
              exit 1
          }
