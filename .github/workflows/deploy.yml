name: Deploy to Windows IIS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Copy to IIS
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: site-content
          clean: false

      - name: Deploy to IIS Folder
        shell: powershell
        run: |
          $sourcePath = "$($env:GITHUB_WORKSPACE)\site-content"
          $destPath = "C:\inetpub\Trip"
          
          Write-Host "來源路徑: $sourcePath"
          Write-Host "目標路徑: $destPath"
          
          if (-not (Test-Path $destPath)) {
              New-Item -ItemType Directory -Force -Path $destPath
          }
          
          # 只針對 index.html 進行複製，這是最安全的
          Copy-Item -Path "$sourcePath\index.html" -Destination "$destPath\index.html" -Force
          
          Write-Host "部署完成！"
