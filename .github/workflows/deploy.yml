name: Deploy to Windows IIS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Copy to IIS
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: site-content
          clean: false  # 關鍵！禁止 Actions 嘗試清理目錄，避免碰到正在使用的 run.cmd

      - name: Deploy to IIS Folder
        shell: powershell
        run: |
          $sourcePath = "site-content"
          $destPath = "C:\inetpub\Trip"
          Write-Host "正在從 $sourcePath 部署檔案到 $destPath..."
          
          if (-not (Test-Path $destPath)) {
              New-Item -ItemType Directory -Force -Path $destPath
          }
          
          # 只複製需要的檔案，完全不理會外層
          Copy-Item -Path "$sourcePath\index.html" -Destination "$destPath\index.html" -Force
          
          Write-Host "部署完成！"
