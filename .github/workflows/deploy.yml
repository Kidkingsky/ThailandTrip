name: Deploy to Windows IIS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Copy to IIS
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          path: deploy_temp_folder
          clean: false

      - name: Deploy to IIS Folder
        shell: powershell
        run: |
          $sourceFile = "$(:GITHUB_WORKSPACE)\deploy_temp_folder\index.html"
          $destPath = "C:\inetpub\Trip"
          $destFile = "C:\inetpub\Trip\index.html"
          
          Write-Host "正在從 $sourceFile 部署到 $destFile..."
          
          if (-not (Test-Path $destPath)) {
              New-Item -ItemType Directory -Force -Path $destPath
          }
          
          if (Test-Path $sourceFile) {
              Copy-Item -Path $sourceFile -Destination $destFile -Force
              Write-Host "部署成功！"
          } else {
              Write-Error "找不到來源檔案：$sourceFile"
              exit 1
          }
